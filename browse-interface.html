<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>STI Browser · Edge Interface</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --bg-primary: #1e1e1e;
      --bg-surface: #2a2a2c;
      --bg-toolbar: #252526;
      --border-default: #3e3e42;
      --border-strong: #505055;
      --text-primary: #e0e0e0;
      --text-secondary: #9d9d9d;
      --accent-color: #4da3e0;
      --accent-light: #1e3a4d;
      --hover-bg: #333336;
      --tab-hover: #38383a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.5);
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      transition: background var(--transition-smooth), color var(--transition-smooth);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { transform: translateX(-8px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes progressPulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .animate-fade-in {
      animation: fadeIn 0.25s ease-out;
    }

    .browser-chrome {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg-primary);
    }

    /* ----- Tab bar ----- */
    .tab-bar {
      display: flex;
      align-items: center;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-default);
      padding: 0 8px;
      gap: 2px;
      min-height: 40px;
      user-select: none;
    }

    .tabs-container {
      display: flex;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 2px;
      align-items: stretch;
      scrollbar-width: thin;
      scrollbar-color: var(--border-default) transparent;
    }

    .tabs-container::-webkit-scrollbar {
      height: 3px;
    }

    .tabs-container::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: 3px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      background: transparent;
      border-radius: 8px 8px 0 0;
      padding: 6px 12px;
      gap: 8px;
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      white-space: nowrap;
      font-size: 13px;
      color: var(--text-secondary);
      border: 1px solid transparent;
      border-bottom: none;
      max-width: 200px;
      position: relative;
      animation: fadeIn 0.2s ease-out;
    }

    .tab-item:hover {
      background: var(--tab-hover);
    }

    .tab-item.active {
      background: var(--bg-surface);
      color: var(--text-primary);
      border-color: var(--border-default);
      border-bottom: 2px solid var(--accent-color);
      font-weight: 500;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      flex: 1;
    }

    .tab-close {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      opacity: 0;
      flex-shrink: 0;
    }

    .tab-item:hover .tab-close,
    .tab-item.active .tab-close {
      opacity: 1;
    }

    .tab-close:hover {
      background: #ff3b30;
      color: white;
      transform: scale(1.1);
    }

    .new-tab-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .new-tab-btn:hover {
      background: var(--hover-bg);
      color: var(--text-primary);
      transform: rotate(90deg);
    }

    /* ----- Navigation toolbar ----- */
    .nav-toolbar {
      display: flex;
      align-items: center;
      background: var(--bg-toolbar);
      padding: 6px 10px;
      gap: 6px;
      border-bottom: 1px solid var(--border-default);
    }

    .nav-btn {
      background: transparent;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: var(--hover-bg);
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .address-bar {
      flex: 1;
      background: var(--bg-surface);
      border: 1.5px solid var(--border-strong);
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 6px 0 14px;
      height: 36px;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }

    .address-bar:focus-within {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .address-icon {
      color: var(--text-secondary);
      margin-right: 8px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .address-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      font-family: var(--font-family);
      min-width: 0;
    }

    .address-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .address-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .action-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      padding: 6px;
      border-radius: 6px;
      transition: all var(--transition-fast);
    }

    .action-icon:hover {
      background: var(--hover-bg);
      color: var(--text-primary);
    }

    /* ----- Progress bar ----- */
    .progress-bar {
      height: 3px;
      background: transparent;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-color);
      width: 0%;
      transition: width 0.3s ease;
      animation: progressPulse 1.5s infinite;
    }

    .progress-fill.complete {
      animation: none;
      width: 100%;
    }

    /* ----- Webview container ----- */
    .webview-container {
      flex: 1;
      background: var(--bg-surface);
      position: relative;
      overflow: hidden;
    }

    .content-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #1e1e1e;
    }

    /* ----- Status bar ----- */
    .status-bar {
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border-default);
      padding: 3px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-left, .status-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #30d158;
    }

    .status-dot.loading {
      background: #ff9f0a;
      animation: progressPulse 1s infinite;
    }

    .status-icon {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color var(--transition-fast);
    }

    .status-icon:hover {
      color: var(--text-primary);
    }

    /* ----- Context menu ----- */
    .context-menu {
      display: none;
      position: fixed;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      box-shadow: var(--shadow-md);
      z-index: 1000;
      min-width: 200px;
      padding: 4px;
      animation: fadeIn 0.15s ease-out;
    }

    .context-menu.visible {
      display: block;
    }

    .context-menu-item {
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .context-menu-item:hover {
      background: var(--hover-bg);
    }

    .context-menu-separator {
      height: 1px;
      background: var(--border-default);
      margin: 4px 8px;
    }

    /* ----- Toast ----- */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      box-shadow: var(--shadow-md);
    }

    .toast.show {
      opacity: 1;
    }

    /* SVG icon sizes */
    .icon-sm { width: 14px; height: 14px; }
    .icon-md { width: 16px; height: 16px; }
    .icon-lg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="browser-chrome">
    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tabs-container" id="tabsContainer"></div>
      <button class="new-tab-btn" id="newTabBtn" title="New tab (Ctrl+T)">
        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Navigation toolbar -->
    <div class="nav-toolbar">
      <button class="nav-btn" id="backBtn" title="Back">
        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <button class="nav-btn" id="forwardBtn" title="Forward">
        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
      <button class="nav-btn" id="reloadBtn" title="Reload">
        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="nav-btn" id="homeBtn" title="Home">
        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>

      <div class="address-bar" id="addressBar">
        <span class="address-icon">
          <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input type="text" class="address-input" id="addressInput" placeholder="Search or enter web address" autocomplete="off" spellcheck="false">
        <div class="address-actions">
          <button class="action-icon" id="bookmarkBtn" title="Bookmark this page">
            <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="nav-btn" id="menuBtn" title="Menu">
        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Webview content -->
    <div class="webview-container" id="webviewContainer">
      <iframe class="content-frame" id="contentFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-indicator">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Ready</span>
        </span>
        <span id="statusUrl" style="opacity:0.7;">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
            <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/>
          </svg>
        </span>
      </div>
      <div class="status-right">
        <span id="tabCount">1 tab</span>
        <span class="status-icon" id="statusTheme" title="Dark theme">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    (function() {
      const TABS_STORAGE_KEY = 'sti_browser_tabs_v3';
      const CONFIG_STORAGE_KEY = 'sti_config_v3';

      const DEFAULT_BOOKMARKS = [
        { title: 'Google', url: 'https://www.google.com' },
        { title: 'YouTube', url: 'https://www.youtube.com' },
        { title: 'GitHub', url: 'https://github.com' },
        { title: 'Wikipedia', url: 'https://wikipedia.org' },
        { title: 'Reddit', url: 'https://www.reddit.com' }
      ];

      const SEARCH_ENGINES = {
        google: 'https://www.google.com/search?q=',
        yandex: 'https://yandex.ru/search/?text=',
        bing: 'https://www.bing.com/search?q=',
        duckduckgo: 'https://duckduckgo.com/?q=',
        brave: 'https://search.brave.com/search?q='
      };

      let tabs = [];
      let activeTabId = null;
      let config = {
        theme: 'dark',
        searchEngine: 'google',
        bookmarks: [...DEFAULT_BOOKMARKS],
        weatherCity: 'Moscow',
        homepage: 'sti://newtab'
      };

      const tabsContainer = document.getElementById('tabsContainer');
      const addressInput = document.getElementById('addressInput');
      const contentFrame = document.getElementById('contentFrame');
      const backBtn = document.getElementById('backBtn');
      const forwardBtn = document.getElementById('forwardBtn');
      const reloadBtn = document.getElementById('reloadBtn');
      const homeBtn = document.getElementById('homeBtn');
      const newTabBtn = document.getElementById('newTabBtn');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const menuBtn = document.getElementById('menuBtn');
      const progressFill = document.getElementById('progressFill');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const statusUrl = document.getElementById('statusUrl');
      const tabCountEl = document.getElementById('tabCount');
      const statusTheme = document.getElementById('statusTheme');
      const contextMenu = document.getElementById('contextMenu');
      const toast = document.getElementById('toast');

      function generateId() {
        return 'tab_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
      }

      function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
      }

      function setLoading(isLoading) {
        if (isLoading) {
          statusDot.classList.add('loading');
          statusText.textContent = 'Loading...';
          progressFill.style.width = '30%';
          progressFill.classList.remove('complete');
        } else {
          statusDot.classList.remove('loading');
          statusText.textContent = 'Ready';
          progressFill.style.width = '100%';
          progressFill.classList.add('complete');
          setTimeout(() => {
            progressFill.style.width = '0%';
            progressFill.classList.remove('complete');
          }, 500);
        }
      }

      function loadConfig() {
        try {
          const stored = localStorage.getItem(CONFIG_STORAGE_KEY);
          if (stored) config = { ...config, ...JSON.parse(stored) };
        } catch (e) {}
      }

      function saveConfig() {
        localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(config));
        if (window.bridge && window.bridge.saveConfig) {
          window.bridge.saveConfig(JSON.stringify(config));
        }
      }

      function loadTabs() {
        try {
          const stored = localStorage.getItem(TABS_STORAGE_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            if (Array.isArray(parsed) && parsed.length > 0) {
              tabs = parsed;
              return;
            }
          }
        } catch (e) {}
        tabs = [{ id: generateId(), title: 'New Tab', url: 'sti://newtab', favicon: '' }];
      }

      function saveTabs() {
        localStorage.setItem(TABS_STORAGE_KEY, JSON.stringify(tabs));
      }

      function getTabById(id) {
        return tabs.find(t => t.id === id);
      }

      function getActiveTab() {
        return getTabById(activeTabId) || tabs[0];
      }

      function updateStatusBar() {
        const tab = getActiveTab();
        if (!tab) return;
        tabCountEl.textContent = `${tabs.length} tab${tabs.length !== 1 ? 's' : ''}`;
        updateBookmarkButton(tab.url);
      }

      function updateBookmarkButton(url) {
        if (!url || url === 'sti://newtab' || url.startsWith('file://')) {
          bookmarkBtn.style.opacity = '0.4';
          return;
        }
        const isBookmarked = config.bookmarks.some(b => b.url === url);
        bookmarkBtn.innerHTML = isBookmarked 
          ? `<svg class="icon-md" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`
          : `<svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
        bookmarkBtn.style.opacity = '1';
      }

      function renderTabs() {
        tabsContainer.innerHTML = '';
        tabs.forEach(tab => {
          const tabEl = document.createElement('div');
          tabEl.className = `tab-item${tab.id === activeTabId ? ' active' : ''}`;
          tabEl.dataset.tabId = tab.id;
          tabEl.title = tab.title || tab.url || 'New Tab';
          
          const faviconUrl = tab.favicon || 
            `data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>')}`;
          
          tabEl.innerHTML = `
            <img class="tab-favicon" src="${faviconUrl}" onerror="this.style.display='none'">
            <span class="tab-title">${escapeHtml(tab.title || 'New Tab')}</span>
            <span class="tab-close" data-close="${tab.id}">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </span>
          `;
          
          tabEl.addEventListener('click', (e) => {
            if (e.target.closest('.tab-close')) return;
            switchTab(tab.id);
          });
          
          tabsContainer.appendChild(tabEl);
        });

        document.querySelectorAll('.tab-close').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeTab(btn.dataset.close);
          });
        });
      }

      function switchTab(tabId) {
        if (activeTabId === tabId) return;
        const currentTab = getActiveTab();
        if (currentTab && currentTab.url !== 'sti://newtab') {
          try {
            const frameUrl = contentFrame.contentWindow?.location?.href;
            if (frameUrl && frameUrl !== 'about:blank') currentTab.url = frameUrl;
          } catch (e) {}
        }
        activeTabId = tabId;
        renderTabs();
        const tab = getTabById(tabId);
        if (tab) {
          navigateToUrl(tab.url, false);
          addressInput.value = tab.url === 'sti://newtab' ? '' : (tab.url || '');
        }
        saveTabs();
        updateStatusBar();
      }

      function closeTab(tabId) {
        if (tabs.length <= 1) {
          tabs = [{ id: generateId(), title: 'New Tab', url: 'sti://newtab', favicon: '' }];
          activeTabId = tabs[0].id;
          renderTabs();
          navigateToUrl('sti://newtab', false);
          addressInput.value = '';
          saveTabs();
          updateStatusBar();
          return;
        }
        const index = tabs.findIndex(t => t.id === tabId);
        if (index === -1) return;
        tabs.splice(index, 1);
        if (activeTabId === tabId) {
          activeTabId = tabs[Math.min(index, tabs.length - 1)].id;
        }
        renderTabs();
        const activeTab = getActiveTab();
        if (activeTab) {
          navigateToUrl(activeTab.url, false);
          addressInput.value = activeTab.url === 'sti://newtab' ? '' : (activeTab.url || '');
        }
        saveTabs();
        updateStatusBar();
      }

      function addTab(url = 'sti://newtab', title = 'New Tab') {
        const newTab = { id: generateId(), title, url, favicon: '' };
        tabs.push(newTab);
        activeTabId = newTab.id;
        renderTabs();
        navigateToUrl(url, false);
        addressInput.value = url === 'sti://newtab' ? '' : url;
        saveTabs();
        updateStatusBar();
        setTimeout(() => {
          const tabEl = document.querySelector(`[data-tab-id="${newTab.id}"]`);
          if (tabEl) tabEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
      }

      function resolveUrl(rawUrl) {
        let url = rawUrl.trim();
        if (!url) return null;
        if (url === 'sti://newtab' || url === 'sti://settings') return url;
        if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('file://')) return url;
        if (url.includes('.') && !url.includes(' ') && !url.includes('://')) return 'https://' + url;
        const engine = config.searchEngine || 'google';
        const baseUrl = SEARCH_ENGINES[engine] || SEARCH_ENGINES.google;
        return baseUrl + encodeURIComponent(url);
      }

      function navigateToUrl(rawUrl, addToHistory = true) {
        const url = resolveUrl(rawUrl);
        if (!url) return;
        setLoading(true);
        if (url === 'sti://newtab') {
          contentFrame.src = 'browse.html';
          updateTabInfo('sti://newtab', 'New Tab', '');
          addressInput.value = '';
        } else if (url === 'sti://settings') {
          contentFrame.src = 'settings.html';
          updateTabInfo('sti://settings', 'Settings', '');
          addressInput.value = 'sti://settings';
        } else {
          contentFrame.src = url;
          updateTabInfo(url, url, '');
          addressInput.value = url;
        }
        updateStatusBar();
        saveTabs();
      }

      function updateTabInfo(url, title, favicon) {
        const tab = getActiveTab();
        if (tab) {
          tab.url = url;
          tab.title = title || url;
          if (favicon) tab.favicon = favicon;
          renderTabs();
        }
      }

      contentFrame.addEventListener('load', () => {
        setLoading(false);
        const tab = getActiveTab();
        if (tab && tab.url !== 'sti://newtab' && tab.url !== 'sti://settings') {
          try {
            const frameUrl = contentFrame.contentWindow?.location?.href;
            const frameTitle = contentFrame.contentDocument?.title;
            if (frameUrl && frameUrl !== 'about:blank') {
              tab.url = frameUrl;
              tab.title = frameTitle || frameUrl;
              addressInput.value = frameUrl;
            }
          } catch (e) {
            addressInput.value = tab.url || '';
          }
          saveTabs();
          updateStatusBar();
        }
      });

      addressInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const url = addressInput.value.trim();
          if (url) navigateToUrl(url);
        }
      });

      addressInput.addEventListener('focus', () => addressInput.select());

      newTabBtn.addEventListener('click', () => addTab('sti://newtab', 'New Tab'));
      
      backBtn.addEventListener('click', () => {
        try { contentFrame.contentWindow?.history?.back(); } catch (e) {}
      });
      
      forwardBtn.addEventListener('click', () => {
        try { contentFrame.contentWindow?.history?.forward(); } catch (e) {}
      });
      
      reloadBtn.addEventListener('click', () => {
        setLoading(true);
        const tab = getActiveTab();
        if (tab && (tab.url === 'sti://newtab' || tab.url === 'sti://settings')) {
          navigateToUrl(tab.url, false);
        } else {
          contentFrame.src = contentFrame.src;
        }
      });
      
      homeBtn.addEventListener('click', () => navigateToUrl(config.homepage || 'sti://newtab'));

      bookmarkBtn.addEventListener('click', () => {
        const tab = getActiveTab();
        if (!tab || !tab.url || tab.url === 'sti://newtab' || tab.url.startsWith('file://')) return;
        const existingIndex = config.bookmarks.findIndex(b => b.url === tab.url);
        if (existingIndex >= 0) {
          config.bookmarks.splice(existingIndex, 1);
          showToast('Bookmark removed');
        } else {
          config.bookmarks.unshift({ title: tab.title || tab.url, url: tab.url });
          showToast('Bookmark added');
        }
        saveConfig();
        updateBookmarkButton(tab.url);
      });

      menuBtn.addEventListener('click', (e) => {
        const rect = menuBtn.getBoundingClientRect();
        contextMenu.innerHTML = `
          <div class="context-menu-item" data-action="new-tab">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Tab
          </div>
          <div class="context-menu-item" data-action="settings">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </div>
          <div class="context-menu-separator"></div>
          <div class="context-menu-item" data-action="updates">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Check for Updates
          </div>
        `;
        contextMenu.style.top = (rect.bottom + 8) + 'px';
        contextMenu.style.right = (window.innerWidth - rect.right) + 'px';
        contextMenu.classList.add('visible');

        contextMenu.querySelectorAll('.context-menu-item').forEach(item => {
          item.onclick = () => {
            const action = item.dataset.action;
            if (action === 'new-tab') addTab('sti://newtab', 'New Tab');
            if (action === 'settings') navigateToUrl('sti://settings');
            if (action === 'updates') showToast('Version 2.0.0 — up to date');
            contextMenu.classList.remove('visible');
          };
        });
      });

      document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target) && e.target !== menuBtn) {
          contextMenu.classList.remove('visible');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 't') { e.preventDefault(); addTab('sti://newtab', 'New Tab'); }
        if (e.ctrlKey && e.key === 'w') { e.preventDefault(); if (activeTabId) closeTab(activeTabId); }
        if (e.ctrlKey && e.key === 'l') { e.preventDefault(); addressInput.focus(); addressInput.select(); }
        if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) { e.preventDefault(); reloadBtn.click(); }
        if (e.ctrlKey && e.key === ',') { e.preventDefault(); navigateToUrl('sti://settings'); }
      });

      function initialize() {
        loadConfig();
        loadTabs();
        if (tabs.length === 0) tabs = [{ id: generateId(), title: 'New Tab', url: 'sti://newtab', favicon: '' }];
        if (!activeTabId || !tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;
        renderTabs();
        const activeTab = getActiveTab();
        if (activeTab) {
          navigateToUrl(activeTab.url, false);
          addressInput.value = activeTab.url === 'sti://newtab' ? '' : (activeTab.url || '');
        }
        saveTabs();
        updateStatusBar();
      }

      initialize();
    })();
  </script>
</body>
</html>
